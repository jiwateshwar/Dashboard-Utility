version: "3.9"
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: prism
      POSTGRES_PASSWORD: prism
      POSTGRES_DB: prism
    ports:
      - "5432:5432"
    volumes:
      - prism_db:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      PORT: 4000
      DATABASE_URL: postgres://prism:prism@db:5432/prism
      SESSION_SECRET: prism_dev_secret
      CORS_ORIGIN: https://prism.theshabd.org
    ports:
      - "4000:4000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  prism_db:
